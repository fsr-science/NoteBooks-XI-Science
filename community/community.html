<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0c0f;
      --surface: #13151a;
      --border: #2a2d36;
      --accent: #e8ff5a;
      --accent-dim: rgba(232, 255, 90, 0.12);
      --text: #f0f0ec;
      --muted: #6b6f7a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      animation: slideDown 0.5s ease both;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      letter-spacing: 0.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .url-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
      min-width: 220px;
      transition: border-color 0.2s;
    }

    .url-bar:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .url-bar svg {
      flex-shrink: 0;
      color: var(--muted);
    }

    .open-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(232, 255, 90, 0.3);
      border-radius: 6px;
      padding: 0.35rem 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      letter-spacing: 0.03em;
    }

    .open-btn:hover {
      background: rgba(232, 255, 90, 0.22);
      border-color: var(--accent);
    }

    .iframe-wrapper {
      flex: 1;
      position: relative;
      animation: fadeIn 0.6s ease 0.2s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.995); }
      to   { opacity: 1; transform: scale(1); }
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    /* Blocked-content fallback overlay */
    .fallback {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem;
    }

    .fallback svg {
      opacity: 0.3;
    }

    .fallback p {
      max-width: 340px;
      line-height: 1.6;
    }

    .fallback a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .fallback a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <span></span>
      Forum
    </div>

    <div class="url-bar">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      primenotepad.rf.gd
    </div>

    <a href="https://primenotepad.rf.gd" target="_blank" class="open-btn">Open in tab ↗</a>
  </header>

  <div class="iframe-wrapper">
    <iframe
      id="community-frame"
      src="https://primenotepad.rf.gd"
      title="NotePad Forums"
      allowfullscreen
      loading="lazy"
    ></iframe>

    <!-- Shown if the site blocks embedding -->
    <div class="fallback" id="fallback">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="9" y1="21" x2="9" y2="9"/>
      </svg>
      <p>
        <strong style="color: var(--text);">NotePad Forums</strong> has blocked embedding in iframes.<br />
        You can still visit it directly:
      </p>
      <a href="https://primenotepad.rf.gd" target="_blank">Open in a new tab ↗</a>
    </div>
  </div>

  <script>
    // Show fallback if iframe fails to load meaningful content
    const frame = document.getElementById('community-frame');
    const fallback = document.getElementById('fallback');

    frame.addEventListener('error', () => {
      frame.style.display = 'none';
      fallback.style.display = 'flex';
    });

    // Detect X-Frame-Options / CSP block (page loads blank)
    const timer = setTimeout(() => {
      try {
        // If the iframe loaded but is cross-origin blank, contentDocument is null
        if (!frame.contentDocument && frame.contentWindow) {
          // cross-origin — assume it loaded; do nothing
        }
      } catch (e) {
        // SecurityError means cross-origin content DID load; that's fine
      }
    }, 4000);
  </script>

</body>
</html>
